<!DOCTYPE html>
<html>
<head>
    <title>Species Generator</title>
<style>
    @font-face {
        font-family: tbs_pokemon_emerald;
        src: url('pokemon_emerald.ttf');
    }
    body { font-family: Arial; padding: 20px; }
    input, textarea { margin: 5px 0; width: 300px; }
    button { margin-top: 10px; }
    #textOverlay { position: absolute; background: transparent; border: none; outline: none; resize: none; padding: 20px 0 0; color: #636363; overflow: hidden; }
</style>
</head>
<body>

<h2>Move Generator V1</h2>
<br> 


<a href="https://github.com/e-ReadMe/pokeemerald-expansion_Project_ReLoad/blob/master/src/data/moves_info.h"target="_blank">Link to the move list</a><br><br>

    <label>------------------------Base Info ------------------------</label><br>

<label>Move Name:</label> <input id="movename" placeholder="Flamethrower"><br>
<label>Base Power:</label><input id="power" type="number"><br>
    <label>Type:</label>
<select id="type">
  <option value="TYPE_NEUTRAL">Neutral</option>
  <option value="TYPE_COMBAT">Combat</option>
  <option value="TYPE_WIND">Wind</option>
  <option value="TYPE_FILTH">Filth</option>
  <option value="TYPE_EARTH">Earth</option>
  <option value="TYPE_BEAST">Beast</option>
  <option value="TYPE_INSECT">Insect</option>
  <option value="TYPE_UNDEAD">Undead</option>
  <option value="TYPE_METAL">Metal</option>
  <option value="TYPE_FIRE">Fire</option>
  <option value="TYPE_WATER">Water</option>
  <option value="TYPE_PLANT">Plant</option>
  <option value="TYPE_ELECTRIC">Electric</option>
  <option value="TYPE_LIGHT">Light</option>
  <option value="TYPE_ICE">Ice</option>
  <option value="TYPE_DRAGON">Dragon</option>
  <option value="TYPE_DARK">Dark</option>
  <option value="TYPE_PUPPET">Puppet</option>
</select>
<br>   
    
<button onclick="generate()">Generate File</button>

<script>
function generate() {
    const movename = document.getElementById("movename").value.toUpperCase().replace(/ /g, "_");
    const power = document.getElementById("power").value;
    const type = document.getElementById("type").value;


    const output = `[MOVE_TEST] =
    {
    [MOVE_SPLASH] =
    {
        .name = COMPOUND_STRING("Splash"),
        .description = COMPOUND_STRING(
            "It's just a splash...\n"
            "Has no effect whatsoever."),
        .effect = EFFECT_DO_NOTHING,
        .power = 0,
        .type = TYPE_NORMAL,
        .accuracy = 0,
        .pp = 40,
        .target = TARGET_USER,
        .priority = 0,
        .category = DAMAGE_CATEGORY_STATUS,
        .zMove = { .effect = Z_EFFECT_ATK_UP_3 },
        .ignoresProtect = TRUE,
        .mirrorMoveBanned = TRUE,
        .gravityBanned = TRUE,
        .contestEffect = CONTEST_EFFECT_BETTER_IF_LAST, //C_UPDATED_MOVE_EFFECTS >= GEN_6 ? CONTEST_EFFECT_QUICKLY_GROW_BORED :
        .contestCategory = CONTEST_CATEGORY_CUTE,
        .contestComboStarterId = 0,
        .contestComboMoves = {0},
        .battleAnimScript = gBattleAnimMove_Splash,
    },

},`;
    downloadFile(`MOVE_TEST.txt`, output);
}

function downloadFile(filename, content) {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
