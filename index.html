<!DOCTYPE html>
<html>
<head>
    <title>Digi Move Generator</title>
<style>
    @font-face {
        font-family: tbs_pokemon_emerald;
        src: url('pokemon_emerald.ttf');
    }
    body { font-family: Arial; padding: 20px; }
    input, textarea { margin: 5px 0; width: 300px; }
    button { margin-top: 10px; }
    #textOverlay { position: absolute; background: transparent; border: none; outline: none; resize: none; padding: 20px 0 0; color: #636363; overflow: hidden; }
</style>
</head>
<body>

<h2>Move Generator V10</h2>
<br> 


<a href="https://github.com/e-ReadMe/pokeemerald-expansion_Project_ReLoad/blob/master/src/data/moves_info.h"target="_blank">Link to the move list</a><br><br>

    <label>------------------------Base Info ------------------------</label><br>

<label>Move Name:</label> <input id="movename" placeholder="Flamethrower"><br><br>
<label>Base Power:</label><input id="power" type="number"><br><br>
    <label>Type:</label>
<select id="type">
  <option value="TYPE_NEUTRAL">Neutral</option>
  <option value="TYPE_COMBAT">Combat</option>
  <option value="TYPE_WIND">Wind</option>
  <option value="TYPE_FILTH">Filth</option>
  <option value="TYPE_EARTH">Earth</option>
  <option value="TYPE_BEAST">Beast</option>
  <option value="TYPE_INSECT">Insect</option>
  <option value="TYPE_UNDEAD">Undead</option>
  <option value="TYPE_METAL">Metal</option>
  <option value="TYPE_FIRE">Fire</option>
  <option value="TYPE_WATER">Water</option>
  <option value="TYPE_PLANT">Plant</option>
  <option value="TYPE_ELECTRIC">Electric</option>
  <option value="TYPE_LIGHT">Light</option>
  <option value="TYPE_ICE">Ice</option>
  <option value="TYPE_DRAGON">Dragon</option>
  <option value="TYPE_DARK">Dark</option>
  <option value="TYPE_PUPPET">Puppet</option>
</select><br><br>  
<label>Category:</label>
    <select id="category">
        <option value="PHYSICAL">Physical</option>
      <option value="SPECIAL">Special</option>
      <option value="STATUS">Status</option>
    </select><br><br>  
 <label>Accuracy (default is 100%):</label><input id="accuracy" type="number" placeholder="0"><label>%</label><br><br>  
 <label>PP (default is 10):</label><input id="accuracy" type="number" placeholder="0"><label>%</label><br><br>
<label>Priority (default is 0):</label><input id="priority" type="number"><br><br>
    <label>Target:</label>
<select id="target (Default is 'selected')">
  <option value="SELECTED">Selected</option>
  <option value="BOTH">Both Opponents</option>
  <option value="USER">User</option>
  <option value="ALLY">Ally (e.g. helping hand)</option>
  <option value="ALL_BATTLERS">All Battlers (e.g. flower gift)</option>
  <option value="FOES_AND_ALLY">Foes and Ally (e.g. earthquake)</option>
  <option value="FIELD">Field (e.g. weather)</option>
  <option value="OPPONENTS_FIELD">Opponent's Field (e.g. spikes)</option>
  <option value="RANDOM">Random (e.g. Outrage)</option>
</select><br><br>  
    
    
<button onclick="generate()">Generate File</button>

<script>
function generate() {
    const movename = document.getElementById("movename").value.toUpperCase().replace(/ /g, "_");
    const power = document.getElementById("power").value;
    const type = document.getElementById("type").value;
    const accuracy = document.getElementById("accuracy").value || "100";
    const pp = document.getElementById("pp").value || "10";
    const target = document.getElementById("target").value;
    const priority = document.getElementById("priority").value || "0";
    const category = document.getElementById("category").value;


    const output = `[MOVE_${movename}] =
    {
    [MOVE_${movename}] =
    {
        .name = COMPOUND_STRING("${movename}"),
        .description = COMPOUND_STRING(
            "It's just a splash...\n"
            "Has no effect whatsoever."),
        .effect = EFFECT_DO_NOTHING,
        .power = ${power},
        .type = TYPE_${type},
        .accuracy = ${accuracy},
        .pp = ${pp},
        .target = TARGET_${target},
        .priority = ${priority},
        .category = DAMAGE_CATEGORY_${category},
        .contestEffect = CONTEST_EFFECT_BETTER_IF_LAST, //C_UPDATED_MOVE_EFFECTS >= GEN_6 ? CONTEST_EFFECT_QUICKLY_GROW_BORED :
        .contestCategory = CONTEST_CATEGORY_CUTE,
        .contestComboStarterId = 0,
        .contestComboMoves = {0},
        .battleAnimScript = gBattleAnimMove_Splash,
    },

},`;
    downloadFile(`MOVE_${movename}.txt`, output);
}

function downloadFile(filename, content) {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
